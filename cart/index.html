<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout</title>
    <link rel="stylesheet" href="style.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <script type="module" src="../header.js"></script>
  </head>
  <body>
    <div class="hompage-marquee">
      <marquee scrollamount="10">
        Upcoming Event: Woven Threads - June 15 - 10pm | Contact Us For
        Appointment!
      </marquee>
    </div>
    <header-main></header-main>
    <main id="cart-drawer" class="cart">
      <div class="cart-header">
        <h2>YOUR CART</h2>
      </div>

      <div id="cart-items-list"></div>

      <div class="cart-footer">
        <div class="total-section">
          <strong>TOTAL:</strong> <span id="cart-total">$0.00</span>
        </div>
        <button class="buy-now-btn" onclick="processCheckout()">
          CHECKOUT NOW
        </button>
      </div>
    </main>
    <footer-main></footer-main>
  </body>
</html>
