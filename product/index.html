<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fashion Showcase</title>
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="../header.js"></script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="hompage-marquee">
      <marquee scrollamount="10">
        Upcoming Event: Woven Threads - June 15 - 10pm | Contact Us For
        Appointment!
      </marquee>
    </div>
    <header-main></header-main>

    <header class="ctr">
      <h1>OUR COLLECTIONS</h1>
    </header>

    <div class="category-filters">
      <button onclick="filterProducts('all')" class="filter-btn active al">
        ALL PRODUCTS
      </button>
      <button onclick="filterProducts('all')" class="filter-btn active al">
        ALL PRODUCTS
      </button>
      <button onclick="filterProducts('Clothes')" class="filter-btn">
        CLOTHES
      </button>
      <button onclick="filterProducts('Shoes')" class="filter-btn">
        SHOES
      </button>
      <button onclick="filterProducts('Handbags')" class="filter-btn">
        HANDBAGS
      </button>
      <button onclick="filterProducts('Jewelry')" class="filter-btn">
        JEWELRY
      </button>
    </div>

    <div id="cart-overlay" class="overlay" onclick="closeCart()"></div>

    <div id="cart-drawer" class="drawer">
      <div class="drawer-header">
        <h2>YOUR CART</h2>
        <button class="close-btn" onclick="closeCart()">×</button>
      </div>

      <div id="cart-items-list"></div>

      <div class="drawer-footer">
        <div class="total-section">
          <strong>TOTAL:</strong> <span id="cart-total">$0.00</span>
        </div>
        <button class="buy-now-btn" onclick="processCheckout()">
          CHECKOUT NOW
        </button>
      </div>
    </div>

    <main id="product-grid" class="product-grid"></main>
    <footer-main></footer-main>

    <script defer src="script.js"></script>
  </body>
</html>
